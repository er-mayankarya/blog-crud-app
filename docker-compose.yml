version: "3.8"

services:

  # ---------------- MONGODB ----------------
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ---------------- BACKEND ----------------
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    restart: always

  # ---------------- FRONTEND ----------------
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

# ---------------- VOLUMES ----------------
volumes:
  mongo_data: